---
- hosts: buildmaster
  become: yes
  become_user: root
  become_method: sudo
  roles:
    - acmetool
    - buildmaster

- hosts: buildslave
  become: yes
  become_user: root
  become_method: sudo
  roles:
    - buildslave
    - btimefiles

- hosts: buildworker
  become: yes
  become_user: root
  become_method: sudo
  roles:
    - buildworker
