---
- name: Common Hashiorp Worker Services
  hosts: hashiworker,hashimirror,hashimx
  become: true
  become_user: root
  become_method: ansible.builtin.sudo
  vars:
    nomad_role: client
  roles:
    - consul
    - nomad_client

- name: Nomad-based Mirrors
  hosts: hashimirror
  become: true
  become_user: root
  become_method: ansible.builtin.sudo
  tasks:
    - name: Accept IPv4 Traffic
      ansible.builtin.lineinfile:
        line: "{{ item }}"
        path: /etc/iptables.d/proxy.rules
        create: true
        owner: root
        group: root
        mode: "0640"
      with_items:
        - "*filter"
        - "-A INPUT -p tcp --dport 80 -j ACCEPT"
        - "-A INPUT -p tcp --dport 443 -j ACCEPT"
        - "-A INPUT -p tcp --dport 873 -j ACCEPT"
        - "COMMIT"
    - name: Accept IPv6 Traffic
      ansible.builtin.lineinfile:
        line: "{{ item }}"
        path: /etc/ip6tables.d/proxy.6rules
        create: true
        owner: root
        group: root
        mode: "0640"
      with_items:
        - "*filter"
        - "-A INPUT -p tcp --dport 80 -j ACCEPT"
        - "-A INPUT -p tcp --dport 443 -j ACCEPT"
        - "-A INPUT -p tcp --dport 873 -j ACCEPT"
        - "COMMIT"

- name: Special rules for d-hel-fi
  hosts: d-hel-fi.m.voidlinux.org
  become: true
  become_user: root
  become_method: ansible.builtin.sudo
  tasks:
    - name: Accept IPv4 Traffic
      ansible.builtin.lineinfile:
        line: "{{ item }}"
        path: /etc/iptables.d/root_mirror.rules
        create: true
        owner: root
        group: root
        mode: "0640"
      with_items:
        - "*filter"
        - "-A INPUT -p tcp --dport 2022 -j ACCEPT"
        - "-A INPUT -p tcp --dport 8001 -j ACCEPT"
        - "-A INPUT -p tcp --dport 8003 -j ACCEPT"
        - "COMMIT"
    - name: Accept IPv6 Traffic
      ansible.builtin.lineinfile:
        line: "{{ item }}"
        path: /etc/ip6tables.d/root_mirror.6rules
        create: true
        owner: root
        group: root
        mode: "0640"
      with_items:
        - "*filter"
        - "-A INPUT -p tcp --dport 2022 -j ACCEPT"
        - "-A INPUT -p tcp --dport 8001 -j ACCEPT"
        - "-A INPUT -p tcp --dport 8003 -j ACCEPT"
        - "COMMIT"

- name: Additional tasks for MX hosts
  hosts: hashimx
  become: true
  become_user: root
  become_method: ansible.builtin.sudo
  tasks:
    - name: Accept IPv4 Traffic
      ansible.builtin.lineinfile:
        line: "{{ item }}"
        path: /etc/iptables.d/maddy.rules
        create: true
        owner: root
        group: root
        mode: "0640"
      with_items:
        - "*filter"
        - "-A INPUT -p tcp --dport 25 -j ACCEPT"
        - "-A INPUT -p tcp --dport 143 -j ACCEPT"
        - "-A INPUT -p tcp --dport 465 -j ACCEPT"
        - "-A INPUT -p tcp --dport 587 -j ACCEPT"
        - "-A INPUT -p tcp --dport 993 -j ACCEPT"
        - "COMMIT"
    - name: Accept IPv6 Traffic
      ansible.builtin.lineinfile:
        line: "{{ item }}"
        path: /etc/ip6tables.d/maddy.6rules
        create: true
        owner: root
        group: root
        mode: "0640"
      with_items:
        - "*filter"
        - "-A INPUT -p tcp --dport 25 -j ACCEPT"
        - "-A INPUT -p tcp --dport 143 -j ACCEPT"
        - "-A INPUT -p tcp --dport 465 -j ACCEPT"
        - "-A INPUT -p tcp --dport 587 -j ACCEPT"
        - "-A INPUT -p tcp --dport 993 -j ACCEPT"
        - "COMMIT"

- name: Build Servers
  hosts: buildworker
  become: true
  become_user: root
  become_method: ansible.builtin.sudo
  roles:
    - buildworker
