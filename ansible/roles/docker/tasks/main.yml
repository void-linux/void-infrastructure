---
- name: Install Packages
  community.general.xbps:
    pkg: docker
    state: present
  tags: [install_docker]

- name: Create config directory
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [install_docker]

- name: Install daemon.json
  ansible.builtin.template:
    src: daemon.json
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify:
    - docker
  tags: [install_docker, configure_docker]

- name: Install Firewall Rules
  ansible.builtin.copy:
    src: docker-dns.rules
    dest: /etc/iptables.d/docker-dns.rules
    owner: root
    group: root
    mode: "0640"
  notify:
    - iptables
  tags: [install_docker, configure_docker]

- name: Enable Service
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  tags: [install_docker, enable_docker]
